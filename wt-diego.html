const beep = (freq = 520, dur = 0.08, vol = 0.1) => {
  try {
    const c = new (window.AudioContext || window.webkitAudioContext)();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = "sine";
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.connect(g);
    g.connect(c.destination);
    o.start();
    o.stop(c.currentTime + dur);
    setTimeout(() => c.close(), dur * 1000 + 100);
  } catch (e) {}
};

const spotifyEmbed = url => {
  if (!url) return null;
  try {
    const m = url.match(/open\.spotify\.com\/(playlist|album|track)\/([a-zA-Z0-9]+)/);
    if (m) return `https://open.spotify.com/embed/${m[1]}/${m[2]}?theme=0&utm_source=generator`;
  } catch(e) {}
  return null;
};
// Helper: build full URL from social key + value
const buildSocialUrl = (key, val) => {
  if (!val?.trim()) return "#";
  const def = SOCIAL_DEFS.find(s => s.key === key);
  if (!def) return "#";
  if (key === "web") return val.startsWith("http") ? val : `https://${val}`;
  // Clean: remove @ prefix, spaces, dashes for phone
  let clean = val.trim();
  if (key === "instagram" || key === "tiktok" || key === "linkedin") clean = clean.replace(/^@/, "");
  if (key === "whatsapp") clean = clean.replace(/[\s\-()]/g, "").replace(/^\+/, "");
  return def.prefix + clean;
};

// ── IMAGE CROPPER ──
function ImageCropper({ src, onSave, onCancel, outputSize = 300, quality = 0.6, mode = "circle" }) {
  const imgRef = useRef(null);
  const boxRef = useRef(null);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [baseSize, setBaseSize] = useState({ w: 0, h: 0 });
  const gesture = useRef({ type: null, startX: 0, startY: 0, startPanX: 0, startPanY: 0, startDist: 0, startZoom: 1 });

  const isCover = mode === "cover";
  const VW = isCover ? 320 : 260;
  const VH = isCover ? 160 : 260;
  const outW = isCover ? 800 : outputSize;
  const outH = isCover ? 400 : outputSize;
  const maxZoom = 6;

  // On image load: calc base size so image COVERS viewport (object-fit:cover logic)
  const onImgLoad = useCallback(() => {
    const img = imgRef.current;
    if (!img) return;
    const nw = img.naturalWidth, nh = img.naturalHeight;
    const coverScale = Math.max(VW / nw, VH / nh);
    setBaseSize({ w: Math.round(nw * coverScale), h: Math.round(nh * coverScale) });
    setPan({ x: 0, y: 0 });
    setZoom(1);
    setLoaded(true);
  }, [VW, VH]);

  // Clamp pan so image always covers viewport completely
  const clampPan = useCallback((px, py, z) => {
    const sw = baseSize.w * z, sh = baseSize.h * z;
    const maxPx = Math.max(0, (sw - VW) / 2);
    const maxPy = Math.max(0, (sh - VH) / 2);
    return { x: Math.max(-maxPx, Math.min(maxPx, px)), y: Math.max(-maxPy, Math.min(maxPy, py)) };
  }, [baseSize, VW, VH]);

  // ── MOUSE drag ──
  const onMouseDown = e => { e.preventDefault(); gesture.current = { type: "drag", startX: e.clientX, startY: e.clientY, startPanX: pan.x, startPanY: pan.y, startDist: 0, startZoom: zoom }; };
  const onMouseMove = e => { if (gesture.current.type !== "drag") return; setPan(clampPan(gesture.current.startPanX + e.clientX - gesture.current.startX, gesture.current.startPanY + e.clientY - gesture.current.startY, zoom)); };
  const onMouseUp = () => { gesture.current.type = null; };

  // ── TOUCH (1-finger drag, 2-finger pinch) ──
  const tdist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
  const onTouchStart = e => {
    e.preventDefault();
    const t = e.touches;
    if (t.length === 1) gesture.current = { type: "drag", startX: t[0].clientX, startY: t[0].clientY, startPanX: pan.x, startPanY: pan.y, startDist: 0, startZoom: zoom };
    else if (t.length >= 2) gesture.current = { type: "pinch", startX: (t[0].clientX + t[1].clientX) / 2, startY: (t[0].clientY + t[1].clientY) / 2, startPanX: pan.x, startPanY: pan.y, startDist: tdist(t[0], t[1]), startZoom: zoom };
  };
  const onTouchMove = e => {
    e.preventDefault();
    const t = e.touches, g = gesture.current;
    if (g.type === "drag" && t.length === 1) {
      setPan(clampPan(g.startPanX + t[0].clientX - g.startX, g.startPanY + t[0].clientY - g.startY, zoom));
    } else if (g.type === "pinch" && t.length >= 2) {
      const ratio = tdist(t[0], t[1]) / g.startDist;
      const nz = Math.max(1, Math.min(maxZoom, g.startZoom * ratio));
      const mx = (t[0].clientX + t[1].clientX) / 2, my = (t[0].clientY + t[1].clientY) / 2;
      setZoom(nz);
      setPan(clampPan(g.startPanX + mx - g.startX, g.startPanY + my - g.startY, nz));
    }
  };
  const onTouchEnd = e => {
    if (e.touches.length === 0) gesture.current.type = null;
    else if (e.touches.length === 1) gesture.current = { type: "drag", startX: e.touches[0].clientX, startY: e.touches[0].clientY, startPanX: pan.x, startPanY: pan.y, startDist: 0, startZoom: zoom };
  };

  // ── WHEEL ──
  const onWheel = e => { e.preventDefault(); const nz = Math.max(1, Math.min(maxZoom, zoom + (e.deltaY > 0 ? -0.12 : 0.12))); setZoom(nz); setPan(p => clampPan(p.x, p.y, nz)); };

  // Button zoom
  const btnZoom = d => { const nz = Math.max(1, Math.min(maxZoom, zoom + d)); setZoom(nz); setPan(p => clampPan(p.x, p.y, nz)); };

  // ── SAVE: crop only visible portion ──
  const doSave = () => {
    const img = imgRef.current;
    if (!img) return;
    setSaving(true);
    const c = document.createElement("canvas"); c.width = outW; c.height = outH;
    const ctx = c.getContext("2d");
    if (!isCover) { ctx.beginPath(); ctx.arc(outW / 2, outH / 2, outW / 2, 0, Math.PI * 2); ctx.clip(); }
    // Map viewport to source image pixels
    const dw = baseSize.w * zoom, dh = baseSize.h * zoom;
    const imgL = (VW / 2 + pan.x) - dw / 2, imgT = (VH / 2 + pan.y) - dh / 2;
    const r = img.naturalWidth / dw;
    ctx.drawImage(img, -imgL * r, -imgT * r, VW * r, VH * r, 0, 0, outW, outH);
    let data; try { data = c.toDataURL("image/webp", quality); } catch(e) { data = c.toDataURL("image/png"); }
    setTimeout(() => { onSave(data); setSaving(false); }, 200);
  };

  const zPct = Math.round(((zoom - 1) / (maxZoom - 1)) * 100);
  const sizeLabel = isCover ? `${outW}×${outH}` : `${outW}px`;

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.92)", backdropFilter: "blur(16px)", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: "92%", maxWidth: isCover ? 380 : 340, background: "#111118", borderRadius: 24, border: "1px solid rgba(79,209,197,.12)", overflow: "hidden" }}>
        <div style={{ padding: "14px 18px", borderBottom: "1px solid rgba(255,255,255,.07)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}><I.Camera sz={16} c="#4FD1C5" /><span style={{ fontSize: 14, fontWeight: 800, letterSpacing: -0.3, color: "#fff" }}>{isCover ? "Ajustar portada" : "Ajustar foto"}</span></div>
          <button onClick={onCancel} style={{ background: "rgba(255,255,255,.03)", border: "1px solid rgba(255,255,255,.07)", width: 28, height: 28, borderRadius: "50%", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}><I.X sz={12} c="rgba(255,255,255,.25)" /></button>
        </div>
        <div style={{ padding: 18, display: "flex", flexDirection: "column", alignItems: "center" }}>
          <p style={{ fontSize: 9, color: "rgba(255,255,255,.25)", marginBottom: 10, letterSpacing: 1.2, fontWeight: 600, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Arrastrá · Pellizcá para zoom</p>

          {/* ── VIEWPORT — CSS transform only, no manual sizing ── */}
          <div ref={boxRef} style={{ width: VW, height: VH, borderRadius: isCover ? 16 : "50%", overflow: "hidden", position: "relative", border: "2px solid rgba(79,209,197,.25)", cursor: "grab", touchAction: "none", background: "#000", boxShadow: "0 0 30px rgba(0,0,0,.6)" }}
            onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
            onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onWheel={onWheel}>
            <img ref={imgRef} src={src} alt="" draggable={false} onLoad={onImgLoad}
              style={{ display: loaded ? "block" : "none", position: "absolute", top: "50%", left: "50%", width: baseSize.w, height: baseSize.h, transform: `translate(-50%,-50%) translate(${pan.x}px,${pan.y}px) scale(${zoom})`, transformOrigin: "center center", pointerEvents: "none", userSelect: "none" }} />
            {loaded && <div style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
              <div style={{ position: "absolute", top: "33.3%", left: 0, right: 0, height: 1, background: "rgba(255,255,255,.05)" }} />
              <div style={{ position: "absolute", top: "66.6%", left: 0, right: 0, height: 1, background: "rgba(255,255,255,.05)" }} />
              <div style={{ position: "absolute", left: "33.3%", top: 0, bottom: 0, width: 1, background: "rgba(255,255,255,.05)" }} />
              <div style={{ position: "absolute", left: "66.6%", top: 0, bottom: 0, width: 1, background: "rgba(255,255,255,.05)" }} />
            </div>}
          </div>

          {/* Zoom */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 14, width: "100%", maxWidth: isCover ? 320 : 260 }}>
            <button onClick={() => btnZoom(-0.3)} style={{ width: 34, height: 34, borderRadius: 10, background: "rgba(255,255,255,.03)", border: "1px solid rgba(255,255,255,.07)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><I.ZoomOut sz={14} c="rgba(255,255,255,.45)" /></button>
            <div style={{ flex: 1, height: 6, borderRadius: 3, background: "rgba(255,255,255,.06)", position: "relative", cursor: "pointer" }}
              onClick={e => { const r = e.currentTarget.getBoundingClientRect(); btnZoom(1 + ((e.clientX - r.left) / r.width) * (maxZoom - 1) - zoom); }}>
              <div style={{ height: 6, borderRadius: 3, background: "linear-gradient(90deg,#1a4d45,#4FD1C5)", width: `${zPct}%`, transition: "width .1s", position: "relative" }}>
                <div style={{ position: "absolute", right: -5, top: -2, width: 10, height: 10, borderRadius: "50%", background: "#4FD1C5", border: "2px solid #111118", boxShadow: "0 0 6px rgba(79,209,197,.4)" }} />
              </div>
            </div>
            <button onClick={() => btnZoom(0.3)} style={{ width: 34, height: 34, borderRadius: 10, background: "rgba(255,255,255,.03)", border: "1px solid rgba(255,255,255,.07)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><I.ZoomIn sz={14} c="rgba(255,255,255,.45)" /></button>
          </div>
          <span style={{ fontSize: 8, color: "rgba(255,255,255,.12)", fontFamily: "'JetBrains Mono',monospace", marginTop: 6 }}>×{zoom.toFixed(1)} · {sizeLabel} · WebP</span>
        </div>
        <div style={{ padding: "0 18px 14px", display: "flex", gap: 10 }}>
          <button onClick={onCancel} style={{ flex: 1, padding: 11, borderRadius: 12, background: "rgba(255,255,255,.03)", border: "1px solid rgba(255,255,255,.07)", color: "rgba(255,255,255,.45)", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancelar</button>
          <button onClick={doSave} disabled={saving} style={{ flex: 1, padding: 11, borderRadius: 12, border: "none", background: "linear-gradient(135deg,#4FD1C5,#1a4d45)", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>{saving ? "Optimizando..." : <><I.Check sz={14} c="#fff" />Aplicar</>}</button>
        </div>
      </div>
    </div>
  );
}

                const basePts = (REFERRAL_POINTS[prod.cat] || 80) * p.qty;
                const purchaseNum = Math.min(idx + 1, 3);
                const multiplier = REFERRAL_BONUS[purchaseNum] || 1;

                return { ...p, prod, pts, spent, purchaseNum, multiplier };

                </div>
                <button onClick={() => setRegOpen(false)}
                  style={{ width: "100%", marginTop: 14, padding: 13, borderRadius: 14, border: "none", background: `linear-gradient(135deg,${C.teal},${C.tealDk})`, color: C.white, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                  <I.Star sz={14} c={C.white} />Explorar tienda completa
                </button>
                <div style={{ textAlign: "center", marginTop: 8 }}>
                  <button onClick={() => setRegOpen(false)} style={{ background: "none", border: "none", color: C.wa(0.25), fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Seguir explorando el perfil</button>
                </div>
              </>)}
            </div>
          </div>
        )}

        {/* ═══════ POST VIEWER ═══════ */}
        {postViewId && (() => {
          const post = feedPosts.find(p => p.id === postViewId);
          if (!post) return null;
          const cat = FEED_CATS.find(c => c.id === post.cat);
          return (
            <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", flexDirection: "column", background: post.img ? C.black : post.g }}>
              {/* Background image if post has one */}
              {post.img && (
                <>
                  {post.imgType?.startsWith("video/") ? (
                    <video src={post.img} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} autoPlay muted loop playsInline />
                  ) : (
                    <img src={post.img} alt="" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                  )}
                  <div style={{ position: "absolute", inset: 0, background: "linear-gradient(transparent 30%, rgba(0,0,0,.85) 75%)" }} />
                </>
              )}
              <button style={{ position: "absolute", top: 16, right: 16, zIndex: 10, width: 34, height: 34, borderRadius: "50%", background: "rgba(0,0,0,.4)", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(10px)" }}
                onClick={() => setPostViewId(null)}><I.X sz={18} c={C.white} /></button>
              {/* Category badge */}
              <div style={{ position: "absolute", top: 18, left: 16, zIndex: 10, display: "flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 8, background: cat?.isVip ? "rgba(255,215,0,.2)" : "rgba(0,0,0,.35)", backdropFilter: "blur(10px)", border: cat?.isVip ? "1px solid rgba(255,215,0,.3)" : "none" }}>
                <span style={{ fontSize: 12 }}>{cat?.emoji}</span>
                <span style={{ fontSize: 10, fontWeight: 700, color: cat?.isVip ? "#FFD700" : C.wa(0.7) }}>{cat?.label}</span>
                {cat?.isVip && <span style={{ fontSize: 7, padding: "1px 5px", borderRadius: 3, background: "rgba(255,215,0,.25)", color: "#FFD700", fontWeight: 900, fontFamily: "'JetBrains Mono',monospace" }}>PREMIUM</span>}
                <span style={{ fontSize: 8, color: C.wa(0.35), marginLeft: 4 }}>{post.ts}</span>
              </div>
              {/* Content */}
              <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-end", padding: "80px 24px 40px", position: "relative", zIndex: 2 }}>
                <div style={{ fontSize: 20, fontWeight: 800, lineHeight: 1.4, color: C.white, textShadow: "0 2px 16px rgba(0,0,0,.5)", marginBottom: 16 }}>{post.caption}</div>
                {post.link && (
                  <a href={post.link} target="_blank" rel="noopener noreferrer"
                    style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "10px 16px", borderRadius: 12, background: "rgba(255,255,255,.15)", backdropFilter: "blur(10px)", border: "1px solid rgba(255,255,255,.2)", color: C.white, fontSize: 12, fontWeight: 700, textDecoration: "none", cursor: "pointer", alignSelf: "flex-start", transition: "all .2s" }}>
                    <I.Link sz={14} c={C.white} /> Investigar más →
                  </a>
                )}
              </div>
              {/* Delete */}
              <div style={{ padding: "12px 24px 28px", display: "flex", gap: 10, position: "relative", zIndex: 2 }}>
                <button onClick={() => { setFeedPosts(p => p.filter(x => x.id !== post.id)); setPostViewId(null); }}
                  style={{ flex: 1, padding: 12, borderRadius: 12, background: "rgba(239,68,68,.15)", border: "1px solid rgba(239,68,68,.25)", color: C.red, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                  <I.Trash sz={14} c={C.red} /> Eliminar post
                </button>
              </div>
            </div>
          );
        })()}

        {/* ═══════ NEW POST UPLOAD ═══════ */}
        {newPostCat && (() => {
          const cat = FEED_CATS.find(c => c.id === newPostCat);
          if (!cat) return null;
          const canPublish = newPostCaption.trim() || newPostImage;
          return (
            <div className="wt-login-overlay" onClick={() => { setNewPostCat(null); setNewPostCaption(""); setNewPostLink(""); setNewPostImage(null); }}>
              <div className="wt-login-card" onClick={e => e.stopPropagation()} style={{ maxWidth: 400 }}>
                <div style={{ padding: "20px 20px 14px", textAlign: "center", position: "relative" }}>
                  <button onClick={() => { setNewPostCat(null); setNewPostCaption(""); setNewPostLink(""); setNewPostImage(null); }}
                    style={{ position: "absolute", top: 12, right: 12, width: 28, height: 28, borderRadius: "50%", background: C.wa(0.05), border: `1px solid ${bd1}`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}><I.X sz={11} c={C.wa(0.35)} /></button>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 8 }}>
                    <span style={{ fontSize: 22 }}>{cat.emoji}</span>
                    <span style={{ fontSize: 16, fontWeight: 800, color: cat.color }}>{cat.label}</span>
                  </div>
                  <div style={{ fontSize: 10, color: tx3 }}>Nueva publicación en esta categoría</div>
                </div>
                <div style={{ padding: "0 20px 20px" }}>
                  {/* Upload area — functional */}
                  <input ref={newPostFileRef} type="file" accept="image/*,video/mp4" style={{ display: "none" }}
                    onChange={e => {
                      const file = e.target.files?.[0];
                      if (!file) return;
                      if (file.size > 10 * 1024 * 1024) { alert("Archivo demasiado grande (máx 10MB)"); return; }
                      const reader = new FileReader();
                      reader.onload = ev => setNewPostImage({ data: ev.target.result, name: file.name, type: file.type, size: file.size });
                      reader.readAsDataURL(file);
                      e.target.value = "";
                    }} />
                  {newPostImage ? (
                    <div style={{ position: "relative", borderRadius: 16, overflow: "hidden", marginBottom: 14, border: `1.5px solid ${cat.color}35` }}>
                      {newPostImage.type?.startsWith("video/") ? (
                        <video src={newPostImage.data} style={{ width: "100%", maxHeight: 220, objectFit: "cover", display: "block", borderRadius: 14 }} controls />
                      ) : (
                        <img src={newPostImage.data} alt="" style={{ width: "100%", maxHeight: 220, objectFit: "cover", display: "block", borderRadius: 14 }} />
                      )}
                      {/* Overlay info + actions */}
                      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "24px 12px 10px", background: "linear-gradient(transparent, rgba(0,0,0,.7))", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <I.Check sz={14} c={C.neon} />
                          <span style={{ fontSize: 9, fontWeight: 700, color: C.neon, fontFamily: "'JetBrains Mono',monospace" }}>
                            {newPostImage.name?.length > 22 ? newPostImage.name.slice(0, 22) + "…" : newPostImage.name}
                          </span>
                          <span style={{ fontSize: 8, color: C.wa(0.4), fontFamily: "'JetBrains Mono',monospace" }}>
                            {(newPostImage.size / 1024).toFixed(0)}KB
                          </span>
                        </div>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => newPostFileRef.current?.click()}
                            style={{ width: 28, height: 28, borderRadius: "50%", background: "rgba(255,255,255,.15)", backdropFilter: "blur(8px)", border: "1px solid rgba(255,255,255,.2)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <I.Repeat sz={12} c={C.white} />
                          </button>
                          <button onClick={() => setNewPostImage(null)}
                            style={{ width: 28, height: 28, borderRadius: "50%", background: "rgba(239,68,68,.25)", backdropFilter: "blur(8px)", border: "1px solid rgba(239,68,68,.3)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <I.Trash sz={12} c={C.red} />
                          </button>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div onClick={() => newPostFileRef.current?.click()}
                      style={{ border: `1.5px dashed ${cat.color}35`, borderRadius: 16, padding: 28, textAlign: "center", marginBottom: 14, background: `${cat.color}06`, cursor: "pointer", transition: "all .2s" }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = cat.color + "60"; e.currentTarget.style.background = cat.color + "0d"; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = cat.color + "35"; e.currentTarget.style.background = cat.color + "06"; }}>
                      <I.Upload sz={28} c={cat.color} sw={1.5} />
                      <div style={{ fontSize: 12, fontWeight: 700, color: cat.color, marginTop: 8 }}>Subir foto o video</div>
                      <div style={{ fontSize: 9, color: tx3, marginTop: 3 }}>JPG, PNG, MP4 — máx 10MB</div>
                    </div>
                  )}
                  {/* Caption */}
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: C.ta(0.4), textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono',monospace" }}>Post</span>
                      <span style={{ fontSize: 9, fontWeight: 600, color: newPostCaption.length > 111 ? C.red : C.wa(0.2), fontFamily: "'JetBrains Mono',monospace" }}>{newPostCaption.length}/111</span>
                    </div>
                    <textarea value={newPostCaption} onChange={e => { if (e.target.value.length <= 111) setNewPostCaption(e.target.value); }}
                      placeholder="Escribí algo sobre esta publicación..."
                      style={{ width: "100%", padding: 12, borderRadius: 12, border: `1px solid ${bd1}`, background: bg1, color: C.white, fontSize: 13, fontFamily: "'Outfit',sans-serif", outline: "none", resize: "none", height: 70, boxSizing: "border-box" }} />
                  </div>
                  {/* Link */}
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.ta(0.4), textTransform: "uppercase", letterSpacing: 1, marginBottom: 5, fontFamily: "'JetBrains Mono',monospace" }}>Link <span style={{ fontSize: 8, color: tx3, fontWeight: 500, letterSpacing: 0, textTransform: "none" }}>— agrega botón "Investigar más"</span></div>
                    <div style={{ display: "flex", borderRadius: 12, overflow: "hidden", border: `1px solid ${bd1}` }}>
                      <div style={{ padding: "10px 8px", background: C.wa(0.04), borderRight: `1px solid ${C.wa(0.06)}`, display: "flex", alignItems: "center" }}>
                        <I.Link sz={14} c={C.wa(0.25)} />
                      </div>
                      <input value={newPostLink} onChange={e => setNewPostLink(e.target.value)}
                        placeholder="https://..."
                        style={{ flex: 1, padding: "10px 12px", border: "none", background: bg1, color: C.white, fontSize: 12, fontFamily: "'Outfit',sans-serif", outline: "none" }} />
                    </div>
                  </div>
                  {/* Publish */}
                  <button onClick={() => {
                    if (!canPublish) return;
                    const colors = [C.teal, C.gold, C.green, C.purple, C.pink, C.blue, C.cyan, C.red];
                    const rc = colors[Math.floor(Math.random() * colors.length)];
                    const nPost = { id: Date.now(), cat: newPostCat, g: `linear-gradient(135deg,${rc},${cat.colorDk})`, caption: newPostCaption, link: newPostLink.trim(), ts: "Ahora", img: newPostImage?.data || null, imgType: newPostImage?.type || null };
                    setFeedPosts(p => [nPost, ...p]);
                    setNewPostCat(null); setNewPostCaption(""); setNewPostLink(""); setNewPostImage(null);
                  }}
                    style={{ width: "100%", padding: 14, borderRadius: 14, border: "none", background: canPublish ? `linear-gradient(135deg,${cat.color},${cat.colorDk})` : C.wa(0.08), color: canPublish ? C.white : tx3, fontSize: 14, fontWeight: 800, fontFamily: "inherit", cursor: canPublish ? "pointer" : "default", transition: "all .2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                    <I.Upload sz={16} c={canPublish ? C.white : tx3} /> Publicar
                  </button>
                </div>
              </div>
            </div>
          );
        })()}

      </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(WorldTalents));
</script>
</body>
</html>
